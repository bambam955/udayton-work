services:
  backend:
    build:
      context: ./backend
    container_name: coil-backend
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-15000}
    restart: unless-stopped
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: coil-frontend
    depends_on:
      - backend
    environment:
      COIL_BACKEND_URL: backend:8080
    restart: unless-stopped
    ports:
      - "3000:80"
