name: Deploy Docker Images

on:
  push:
    tags:
      - "**"

env:
  DOCKER_REPO: bambam955/coil-team2

jobs:
  publish-images:
    # Push events also fire for tag deletions and force-updates.
    # Only publish images when a brand-new tag is pushed to the remote.
    if: github.event.created == true && github.event.deleted == false
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          # Each service directory contains its own Dockerfile.
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          # Keep the existing service tags for deployment targets, and
          # publish a release-specific tag for traceability and rollback.
          tags: |
            ${{ env.DOCKER_REPO }}:${{ matrix.service }}
            ${{ env.DOCKER_REPO }}:${{ matrix.service }}-${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
