<!DOCTYPE html>
<html lang="en">
<script src="https://udayton-cloud.bitbucket.io/clock.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

<head>
    <meta charset="UTF-8">
    <title>CPS449 - Test page of Bennett Moore</title>
    <link rel="stylesheet" href="https://udayton-cloud.bitbucket.io/style1.css" />
    <style>
        .button {
            background-color: #4CAF50;
            /* Green */
            border: none;
            color: white;
            padding: 5px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 12px;
            margin: 4px 2px;
            cursor: pointer;
        }

        .round {
            border-radius: 8px;
        }

        #response {
            background-color: #ff9800;
        }
    </style>
</head>

<body>
    <div class="container wrapper">
        <div id="top">
            <h1>A test webpage for CPS449 - Cloud-based Intelligent Application Development</h1>
            <h2>By Bennett Moore</h2>
            <div id="email" onclick="showHideEmail()">Show my email</div>
            <script src="email.js"></script>
        </div>
        <div class="wrapper">
            <div id="menubar">
                <p>Just a demo HTML page.</p>
                <canvas id="analog-clock" width="150" height="150" style="background-color:#999"></canvas>
                <script>
                    var canvas = document.getElementById('analog-clock');
                    var ctx = canvas.getContext('2d');
                    var radius = canvas.height / 2;
                    ctx.translate(radius, radius);
                    radius = radius * 0.90;
                    setInterval(drawClock, 1000);

                    function drawClock() {
                        drawFace(ctx, radius);
                        drawNumbers(ctx, radius);
                        drawTime(ctx, radius);
                    }
                </script>
            </div>
            <div id="main">
                <div id="mydiv" onclick="document.getElementById('mydiv').innerHTML = 'Clicked time: ' + Date()">
                    Click here for current time
                </div>
                <div id="digit-clock"></div>
                <script>
                    function displayTime() {
                        document.getElementById('digit-clock').innerHTML = "Current time: " + new Date()
                    }
                    setInterval(displayTime, 500);
                </script>
                <form action="echo.php" method="POST">
                    Your input: <input name="data" id="data" onkeyup="console.log('You have pressed a key')" />
                    <input class="button round" type="button" value="Ajax Echo" onclick="getEcho()" />
                    <input class="button round" type="button" value="jQuery Ajax GET" onclick="jQueryAjax()" />
                    <input class="button round" type="button" value="jQuery Ajax POST" onclick="jQueryAjaxPost()" />
                    <input class="button round" type="button" value="Laugh" onclick="fetchJoke()" />
                </form>
                <div id="response"></div>
                <script>
                    function getEcho() {
                        var input = document.getElementById('data').value;
                        if (input.length == 0) return;

                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                console.log('Received data=' + xhttp.responseText);
                                // Show the data
                                document.getElementById('response').innerText = 'Response from server:' + xhttp.responseText;
                            }
                        }
                        // create an Ajax request
                        xhttp.open('GET', 'echo.php?data=' + input, true);
                        // send the request
                        xhttp.send();
                        document.getElementById('data').value = '';
                    }
                    function jQueryAjax() {
                        var input = $('#data').val();
                        if (input.length == 0) return;
                        $.get('echo.php?data=' + input,
                            function (result) {
                                $("#response").html("Response from server: " + result);
                            }
                        );
                        $('#data').val('');
                    }
                    function jQueryAjaxPost() {
                        var input = $('#data').val();
                        if (input.length == 0) return;
                        $.post('echo.php', { data: input },
                            function (result) {
                                $("#response").html("Response from server: " + result);
                            }
                        );
                        $('#data').val('');
                    }
                    async function fetchJoke() {
                        const jokeAPI_res = await
                            fetch("https://v2.jokeapi.dev/joke/Programming?type=single");
                        const result = await jokeAPI_res.json();
                        console.log("[Debug] From jokeAPI: " + JSON.stringify(result, null, 2));
                        $("#response").html("A programming joke of the day: " + (result?.joke || "No joke"));
                    };

                </script>
            </div>
        </div>
    </div>
</body>

</html>
